name: Update Date in README

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정에 실행

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Update Date
        run: |
          DATE=$(date '+%Y-%m-%d')
          sed -i "s/Date_goes_here/$DATE/" README.md

          git config --global user.email "ojw1912@gmail.com"
          git config --global user.name "Theo"
          git commit -am "Automatically update date in README"
          git push
