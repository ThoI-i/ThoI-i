name: Update README Date

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정에 실행
  workflow_dispatch:

jobs:
  update-readme-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Update Date in README
        run: |
          DATE=$(date '+%Y-%m-%d')
          sed -i "s/\\[Last Updated\\]: .*$/[Last Updated]: $DATE/" README.md
          git config user.email "ojw1912@gmail.com"
          git config user.name "Theo"
          git add README.md
          git commit -m "Update last updated date in README"
          git push
