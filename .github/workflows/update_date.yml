name: Update README Date

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정에 실행
  workflow_dispatch:

jobs:
  update-readme-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Configure Git
        run: |
          git config user.email "ojw1912@gmail.com"
          git config user.name "Theo"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}
      - name: Calculate D+XXX and Update README
        run: |
          # 오늘 날짜 계산
          TODAY=$(date '+%d %b %Y')

          # 기준일 계산
          START_DATE="2024-10-07"
          START_SECONDS=$(date -d $START_DATE +%s)
          TODAY_SECONDS=$(date +%s)

          # 날짜 차이 계산
          DIFF_DAYS=$(( (TODAY_SECONDS - START_SECONDS) / 86400 ))
          FORMATTED_DATE=$(date '+%b %d %Y')

          # D+ 업데이트
          sed -i "s/D+[0-9]\+[^0-9]/D+$DIFF_DAYS /" README.md
          sed -i "s/📅TODAY :.*$/📅TODAY : $FORMATTED_DATE/" README.md

          # 변경 사항 커밋
          git add README.md
          git commit -m "Update D+ and last updated date in README" || echo "Nothing to commit"
          git push
